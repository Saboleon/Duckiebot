signs_sim:
  stop: [24, 25, 26]
  yield: [39]
  pedestrian: [20]
  t_right: [9]
  t_left: [10]
  t_junction: [11]
  turn_left: [50]
  turn_right: [51]
  go_straight: [52]
  yield_left: [54]
  parking: [53]

signs_real:
  stop: [24, 25, 26]
  yield: [39]
  pedestrian: [20]
  t_right: [9]
  t_left: [10]
  t_junction: [11]
  turn_left: [50]
  turn_right: [51]
  go_straight: [52]
  yield_left: [54]
  parking: [53]

camera:
  tag_size_m: 0.08
  focal_px: 320.0

detection:
  observe_px: 15
  act_px: 70
  every_n_frames: 1

sign_timeout_s: 30.0

speed:
  cruise: 0.24
  approach: 0.18

lane:
  yellow_hsv_lo: [20, 60, 60]
  yellow_hsv_hi: [45, 255, 255]

stopline:
  red1_lo: [0, 90, 70]
  red1_hi: [10, 255, 255]
  red2_lo: [170, 90, 70]
  red2_hi: [180, 255, 255]
  roi_top: 0.65
  trigger_area_frac: 0.09

timing:
  stop_dwell: 0.5
  yield_dwell: 0.4
  clear_time: 0.8
  yield_max_wait: 5.0

turn:
  creep_s: 1.2
  left:
    creep_s: 1.3
    creep_lean: 0.0
    speed: 0.40
    sharpness: 0.06
    duration: 2.7
  right:
    creep_s: 0.6
    speed: 0.30
    sharpness: 0.03
    duration: 1.4
  straight:
    speed: 0.28
    duration: 2.2

obstacle:
  enabled: true
  stop_y_frac: 0.5        # stop earlier (was 0.6) — more braking distance
  min_height_frac: 0.04   # detect smaller/farther ducks (was 0.06)
  lane_x_min_frac: 0.30

yield_traffic:
  enabled: true
  classes: []
  min_score: 0.5
  zone_top_frac: 0.25    # only watch the middle band — avoids detecting cars stopped at our own line
  zone_bottom_frac: 0.65
