# =====================================================================
# Traffic Signs project configuration
# =====================================================================
# Everything the agent reads at runtime lives here so it can be tuned
# live from the dashboard (or by editing this file) without touching code.
#
# The AprilTag IDs below were observed in THIS team's Duckietown by running
# the detector over tasks/object_detection/dataset/raw/*.jpg. Verify them
# against the physical signs on the bot before the demo.
#   24, 25, 26 -> STOP (red octagon)        39 -> YIELD (red triangle)
#   20 -> pedestrian crossing               9 -> side road on the RIGHT
#   10 -> side road on the LEFT             11 -> T-intersection (road ends)
# ---------------------------------------------------------------------

# tag id -> sign category
signs:
  stop: [24, 25, 26]
  yield: [39]
  pedestrian: [20]
  # intersection signs. The value is the list of turns they permit; at the
  # intersection the agent picks ONE of these at random (project requirement).
  t_right: [9] # straight or right
  t_left: [10] # straight or left
  t_junction: [11] # left or right (road ends ahead)
  # single-direction signs (custom IDs for OUR map - not standard Duckietown).
  # Each permits exactly ONE turn, so the agent always drives that direction.
  # These IDs are arbitrary: assign the matching tag36_11_000NN.png in the map
  # editor, and print/stick the same tag on the real bot's sign if used there.
  turn_left: [50] # mandatory left
  turn_right: [51] # mandatory right
  go_straight: [52] # mandatory straight ahead
  yield_left: [54] # combined: yield (brief pause) AND then mandatory left
  # parking: not an intersection. The bot pulls over (right signal) and stops.
  parking: [53]

# camera / tag geometry (only used for the on-screen distance estimate)
camera:
  tag_size_m: 0.08 # sim sign edge length (0.08 m QuadMesh in Godot)
  focal_px: 320.0 # approx rectified focal length at 640x480

# when to react to a sign, measured by the tag's apparent height in pixels.
# (dataset measured: far ~16px, median ~54px, very close ~123px)
detection:
  observe_px: 15 # below this the tag is too far -> note but ignore
  act_px: 70 # at/above this -> we are AT the intersection
  every_n_frames: 1 # run tag detection every N camera frames

# seconds a sign must be close (>= act_px) before acting without a red line.
# lower = reacts sooner when there's no red line; higher = gives the red line more time to trigger.
# live-tune: key=sign_timeout_s value=3.0
sign_timeout_s: 30.0

# wheel speeds, each in [-1, 1].
# Lane following itself reuses the visual_lane_servoing controller, which is
# tuned in config/lane_servoing_config.yaml + lane_servoing_hsv_config.yaml.
# 'cruise' should match that controller's base_speed for identical behaviour;
# 'approach' is the slower speed used once a sign is in range.
speed:
  cruise: 0.24 # a little faster than the visual_lane_servoing base_speed
  approach: 0.18 # slowed speed once a turn is queued / sign is in range

# colour range used only by the optional obstacle detector (duck/bot ahead)
lane:
  yellow_hsv_lo: [20, 60, 60]
  yellow_hsv_hi: [45, 255, 255]

# stop-line detection (red band on the floor before an intersection)
stopline:
  red1_lo: [0, 90, 70]
  red1_hi: [10, 255, 255]
  red2_lo: [170, 90, 70]
  red2_hi: [180, 255, 255]
  roi_top: 0.65
  trigger_area_frac: 0.09 # red fraction in the ROI that counts as a line

# right-of-way gating at the stop line, seconds.
timing:
  stop_dwell: 0.5 # full stop held at a STOP sign
  yield_dwell: 0.4 # brief pause at a YIELD sign when no traffic is present
  clear_time: 0.8 # right-of-way: intersection must read clear this long before going
  yield_max_wait: 8.0 # safety cap: stop waiting for traffic to clear after this many s

# turn maneuvers = gradual forward arcs (both wheels move forward), tuned per
# direction. radius ~ speed/sharpness (smaller sharpness = wider), angle ~
# sharpness x duration. LEFT is wider/deeper (crosses to the far lane); RIGHT is
# tighter (less space). MUST be tuned on the real bot.
turn:
  creep_s: 1.2 # ease straight into the intersection first (all turns)
  left:
    creep_s: 1.3 # shorter run-in so it doesn't cross in too deep
    creep_lean: 0.0 # no lean (0.04 made it swing too far left)
    speed: 0.40 # wider arc -> a bit faster
    sharpness: 0.06 # gentler -> larger radius
    duration: 2.7 # shorter arc so it doesn't overshoot the far lane
  right:
    creep_s: 0.6
    speed: 0.30
    sharpness: 0.03 # a touch wider so it stops clipping the corner sign
    duration: 1.4
  straight:
    speed: 0.28 # clear the intersection briskly
    duration: 2.2

# obstacle stopping: stop for duckies using the trained object_detection model
# (tasks/project/models/best.onnx). Runs on a background thread. Set false to
# disable if it causes false stops on the real bot. Stop thresholds (lane width,
# proximity) live in tasks/object_detection/packages/stop_activity.py.
obstacle:
  enabled: true
  # duck must reach this fraction of frame height (bbox bottom) before we stop.
  # lower = brake from farther away (we lowered it from 0.72 because the bot now
  # cruises faster and needs more stopping distance). raise it if it stops too early.
  stop_y_frac: 0.6

# right-of-way at yield/stop signs: the bot holds until crossing traffic clears,
# detected via the object detector (camera-based, so it works in sim and on the
# real bot). needs obstacle.enabled = true. set enabled=false to fall back to a
# fixed timed pause. tune the band/classes if it never sees (or always sees) traffic.
yield_traffic:
  enabled: true
  classes: [] # detector classes that count as traffic ([]=any object; 1=other bots, 0=duckies)
  min_score: 0.5 # ignore detections below this confidence (cuts false positives)
  zone_top_frac: 0.30 # watch this vertical band of the frame for crossing traffic
  zone_bottom_frac: 0.80
